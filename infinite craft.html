<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crafting Sandbox</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --sidebar-bg: #1f2833;
            --text-color: #c5a059;
            --element-bg: #202833;
            --element-border: #45a29e;
            --workspace-bg: #0b0c10;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: #fff; display: flex; height: 100vh; overflow: hidden; }

        #workspace { flex: 1; background: var(--workspace-bg); position: relative; overflow: hidden; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 0); background-size: 24px 24px; }
        
        #sidebar { width: 300px; background: var(--sidebar-bg); border-left: 2px solid #2c3540; display: flex; flex-direction: column; z-index: 10; }
        #search-box { padding: 15px; border-bottom: 1px solid #2c3540; }
        #search-input { width: 100%; padding: 10px; background: #0b0c10; border: 1px solid var(--element-border); color: #fff; border-radius: 5px; }
        #inventory { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; }

        .element { padding: 8px 14px; background: var(--element-bg); border: 1px solid var(--element-border); border-radius: 5px; cursor: grab; font-weight: bold; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; color: #e5e5e5; white-space: nowrap; }
        .element:active { cursor: grabbing; }
        
        .workspace-element { position: absolute; touch-action: none; }
        .sidebar-element { position: relative; }

        #controls { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; gap: 10px; }
        button { padding: 10px 15px; background: #1f2833; border: 1px solid var(--element-border); color: #fff; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--element-border); color: #0b0c10; }
        
        #loading-toast { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ffc107; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="controls">
        <button onclick="setApiKey()">Set Groq API Key</button>
        <button onclick="clearWorkspace()">Clear Screen</button>
    </div>

    <div id="workspace"></div>

    <div id="sidebar">
        <div id="search-box">
            <input type="text" id="search-input" placeholder="Search elements..." oninput="filterInventory()">
        </div>
        <div id="inventory"></div>
    </div>

    <div id="loading-toast">Consulting the AI...</div>

    <script>
        const workspace = document.getElementById('workspace');
        const inventoryContainer = document.getElementById('inventory');
        const loadingToast = document.getElementById('loading-toast');
        
        let apiKey = localStorage.getItem('groq_api_key') || '';
        let inventory = JSON.parse(localStorage.getItem('ic_inventory')) || ['🔥 Fire', '💧 Water', '🌱 Earth', '💨 Air'];
        let combinationsCache = JSON.parse(localStorage.getItem('ic_cache')) || {};
        
        let activeDrag = null;
        let offsetX = 0;
        let offsetY = 0;

        function init() {
            renderInventory();
        }

        function setApiKey() {
            const key = prompt("Please enter your Groq API Key:", apiKey);
            if (key !== null) {
                apiKey = key.trim();
                localStorage.setItem('groq_api_key', apiKey);
            }
        }

        function renderInventory() {
            inventoryContainer.innerHTML = '';
            inventory.forEach(item => {
                const el = document.createElement('div');
                el.className = 'element sidebar-element';
                el.textContent = item;
                el.onmousedown = (e) => spawnToWorkspace(e, item);
                inventoryContainer.appendChild(el);
            });
        }

        function filterInventory() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const elements = inventoryContainer.getElementsByClassName('sidebar-element');
            Array.from(elements).forEach(el => {
                el.style.display = el.textContent.toLowerCase().includes(query) ? 'inline-flex' : 'none';
            });
        }

        function clearWorkspace() {
            workspace.innerHTML = '';
        }

        function spawnToWorkspace(e, text) {
            e.preventDefault();
            const rect = workspace.getBoundingClientRect();
            const x = e.clientX - rect.left - 40;
            const y = e.clientY - rect.top - 15;
            
            const el = createWorkspaceElement(text, x, y);
            startDrag(e, el);
        }

        function createWorkspaceElement(text, x, y) {
            const el = document.createElement('div');
            el.className = 'element workspace-element';
            el.textContent = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            
            el.onmousedown = (e) => startDrag(e, el);
            workspace.appendChild(el);
            return el;
        }

        function startDrag(e, el) {
            if (e.button !== 0) return;
            e.preventDefault();
            activeDrag = el;
            workspace.appendChild(el);
            
            const rect = el.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            document.onmousemove = dragMove;
            document.onmouseup = dragEnd;
        }

        function dragMove(e) {
            if (!activeDrag) return;
            const rect = workspace.getBoundingClientRect();
            let x = e.clientX - rect.left - offsetX;
            let y = e.clientY - rect.top - offsetY;
            
            activeDrag.style.left = `${x}px`;
            activeDrag.style.top = `${y}px`;
        }

        function dragEnd(e) {
            if (!activeDrag) return;
            
            const dragged = activeDrag;
            activeDrag = null;
            document.onmousemove = null;
            document.onmouseup = null;

            const wRect = workspace.getBoundingClientRect();
            if (e.clientX > wRect.right || e.clientX < wRect.left || e.clientY > wRect.bottom || e.clientY < wRect.top) {
                dragged.remove();
                return;
            }

            // Fixed Collision Check: Uses distance center-points for complete safety in GitHub Pages environments
            const targets = workspace.getElementsByClassName('workspace-element');
            for (let target of targets) {
                if (target === dragged) continue;

                if (isColliding(dragged, target)) {
                    combineElements(dragged, target);
                    return;
                }
            }
        }

        function isColliding(el1, el2) {
            const r1 = el1.getBoundingClientRect();
            const r2 = el2.getBoundingClientRect();
            
            // Check absolute overlap bounds securely
            const overlap = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
            if (overlap) return true;

            // Fallback: Check center distance to fix styling engine bugs inside sub-frames
            const c1x = r1.left + r1.width / 2;
            const c1y = r1.top + r1.height / 2;
            const c2x = r2.left + r2.width / 2;
            const c2y = r2.top + r2.height / 2;
            
            const distance = Math.sqrt(Math.pow(c1x - c2x, 2) + Math.pow(c1y - c2y, 2));
            return distance < 65; // Matches typical element box dimensions
        }

        async function combineElements(el1, el2) {
            const txt1 = el1.textContent.trim();
            const txt2 = el2.textContent.trim();
            const pairKey = [txt1, txt2].sort().join(' + ');

            const spawnX = (parseFloat(el1.style.left) + parseFloat(el2.style.left)) / 2;
            const spawnY = (parseFloat(el1.style.top) + parseFloat(el2.style.top)) / 2;

            el1.remove();
            el2.remove();

            if (combinationsCache[pairKey]) {
                handleNewResult(combinationsCache[pairKey], spawnX, spawnY);
                return;
            }

            if (!apiKey) {
                alert("Please click 'Set Groq API Key' at the top first!");
                createWorkspaceElement(txt1, spawnX - 30, spawnY);
                createWorkspaceElement(txt2, spawnX + 30, spawnY);
                return;
            }

            loadingToast.style.display = 'block';

            try {
                const result = await fetchLlamaCombination(txt1, txt2);
                if (result) {
                    combinationsCache[pairKey] = result;
                    localStorage.setItem('ic_cache', JSON.stringify(combinationsCache));
                    handleNewResult(result, spawnX, spawnY);
                } else {
                    throw new Error("Empty AI response received");
                }
            } catch (err) {
                console.error("AI Error:", err);
                alert(`Error communicating with Groq API:\n${err.message}\n\nPlease check your console.`);
                createWorkspaceElement(txt1, spawnX - 30, spawnY);
                createWorkspaceElement(txt2, spawnX + 30, spawnY);
            } finally {
                loadingToast.style.display = 'none';
            }
        }

        function handleNewResult(result, x, y) {
            createWorkspaceElement(result, x, y);
            if (!inventory.includes(result)) {
                inventory.push(result);
                localStorage.setItem('ic_inventory', JSON.stringify(inventory));
                renderInventory();
            }
        }

        async function fetchLlamaCombination(item1, item2) {
            const prompt = `You are the backend engine of Infinite Craft. Combine "${item1}" and "${item2}" to form a new single concept.
Rule: Output ONLY exactly one relevant emoji followed by a space and the element title. No markup, no quotes, no markdown bolding, no punctuation, no conversation.

Examples:
Input: 🔥 Fire + 💧 Water
Output: 💨 Steam
Input: ⛰️ Mountain + 💨 Air
Output: 🌋 Volcano

Input: ${item1} + ${item2}
Output:`;

            const response = await fetch("https://groq.com", {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-specdec',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.0,
                    max_tokens: 20
                })
            });

            if (!response.ok) {
                const textErr = await response.text();
                throw new Error(`HTTP ${response.status}: ${textErr}`);
            }

            const data = await response.json();
            if (data.choices && data.choices[0] && data.choices[0].message) {
                return data.choices[0].message.content.trim();
            }
            return null;
        }
    </script>
</body>
</html>
